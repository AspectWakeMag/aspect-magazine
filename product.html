<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aspect Magazine - Numero 3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/jpeg" href="images/icon-vague.jpg">
</head>
<body class="product-page">
    <main class="main-container">
        <!-- PARTIE GAUCHE -->
        <section class="left-pane product-left">
            <div class="product-nav">
                <a href="index.html#shop" class="btn-nav">← Back to shop</a>
            </div>
            <div class="product-carousel" id="product-carousel">
                <!-- Injecté par JS -->
            </div>
            <div id="cursor-follower">See More</div>
        </section>

        <!-- PARTIE DROITE -->
        <section class="right-pane product-right">
            <header class="header-grid">
                <div class="col-1">
                    <a href="index.html#landing" class="btn-nav">Aspect Numero 3</a>
                </div>
                <div class="col-2 align-right">
                    <a href="cart.html" class="btn-nav">Cart (0)</a>
                    <a href="index.html#shop" class="btn-nav">Shop</a>
                </div>
                <div class="col-3 align-right">
                    <a href="index.html#about" class="btn-nav">About</a>
                </div>
            </header>

            <div class="product-details">
                <div class="product-header">
                    <h1 id="p-title">...</h1>
                    <p id="p-subtitle"></p>
                    <p id="p-price"></p>
                </div>

                <div class="product-description">
                    <p><span id="p-desc"></span> <button id="toggle-content" class="btn-nav" style="display:none;">See content</button></p>
                    <div class="product-content-toggle">
                        <div id="magazine-content" class="details-hidden">
                            <div class="summary-grid" id="p-summary"></div>
                        </div>
                    </div>
                </div>

                <div class="product-footer-info header-grid">
                    <div class="col-1" id="p-specs">
                        <p>...</p>
                    </div>
                    <div class="col-2-3 align-right">
                        <p id="lang-selector">Select language <button id="lang-fr" class="btn-nav">FR</button> / <button id="lang-en" class="btn-nav">EN</button></p>
                        <p><button id="add-to-cart-dynamic" class="btn-nav-cart">Add to cart</button></p>
                        <p id="p-stock" class="stock-warning" style="display:none;"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
