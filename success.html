<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Aspect Magazine</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/jpeg" href="images/icon-vague.jpg">
    <style>
        .success-wrapper { display: flex; justify-content: center; align-items: center; height: 100vh; background: #fff; }
    </style>
</head>
<body>
    <div class="success-wrapper">
        <div class="order-modal" style="box-shadow: none;">
            <div class="modal-top">
                <p id="order-id">Order Processing...</p>
                <p>Check your email for confirmation.</p>
            </div>
            <div class="modal-center">
                <p>Thank you<br>for your order.</p>
            </div>
            <div class="modal-bottom">
                <p>Follow our journey on instagram<br>
                   <a href="https://www.instagram.com/aspectwakemag/" target="_blank" rel="noopener noreferrer" class="btn-nav" style="opacity:1; color:#000;">@aspectwakemag</a>
                </p>
                <br>
                <a href="/" class="btn-nav" style="opacity:1; color:#000; text-decoration: underline;">Back to home</a>
            </div>
        </div>
    </div>
    <script>
        // Nettoyage du panier au succès
        localStorage.removeItem('aspect_cart');
        const urlParams = new URLSearchParams(window.location.search);
        const orderNumber = urlParams.get('order_number');
        if (orderNumber) {
            document.getElementById('order-id').textContent = `Order n°${orderNumber}`;
        }
    </script>
</body>
</html>
